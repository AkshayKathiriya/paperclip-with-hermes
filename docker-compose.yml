services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-paperclip}"
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  paperclip:
    build:
      context: ./paperclip
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: "postgres://paperclip:${POSTGRES_PASSWORD:-paperclip}@db:5432/paperclip"
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      # Worker is reachable by its service name inside docker compose network
      VIDEO_WORKER_URL: "http://worker:5000"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
      worker:
        condition: service_healthy

  worker:
    build:
      context: ./worker
    ports:
      - "5001:5000"
    environment:
      PORT: "5000"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      PEXELS_API_KEY: "${PEXELS_API_KEY:-}"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"
      ELEVENLABS_VOICE_ID: "${ELEVENLABS_VOICE_ID:-}"
      ELEVENLABS_MODEL: "${ELEVENLABS_MODEL:-eleven_turbo_v2_5}"
      OUTPUT_DIR: "/data/videos"
      WHISPER_MODEL: "${WHISPER_MODEL:-base}"
      WORKER_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
    volumes:
      - worker-data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  pgdata:
  paperclip-data:
  worker-data:
